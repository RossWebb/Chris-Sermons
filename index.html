<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ol Sermon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<!-- Header Banner -->
  <header class="bg-blue-700 text-white shadow-md p-4 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto flex items-start justify-between gap-4">
      
      <!-- Flex container with items-start keeps the icon pinned left -->
      <h1 class="text-xl font-bold tracking-wide flex items-start gap-2">
        <span class="leading-none pt-0.5">📁</span>
        <!-- Wrapping the title in its own span forces the hanging indent column -->
        <span class="leading-tight">Broome People's Church Sermons</span>
      </h1>
      
      <button id="backBtn" class="hidden bg-blue-800 hover:bg-blue-900 text-sm px-3 py-1.5 rounded transition shrink-0">
        ← Gobak long ol Topic
      </button>
    </div>
  </header>

  <main class="flex-grow p-4 max-w-4xl w-full mx-auto">
    
<!-- PWA Dynamic Installation Helper Banner -->
    <div id="pwaInstallBanner" class="hidden bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-4 rounded-xl mb-6 shadow-md flex flex-col sm:flex-row items-center justify-between gap-3">
      <!-- Flex row container holds icon and text side-by-side -->
      <div class="flex items-start gap-3">
        <span class="text-2xl leading-none pt-0.5">📱</span>
        <!-- Text container keeps title and subtitle strictly aligned without wrapping under the icon -->
        <div>
          <h3 class="font-bold text-sm sm:text-base leading-tight">Instolem App ia</h3>
          <p id="pwaInstructionText" class="text-xs text-blue-100 mt-1">Instolem blo yu save gat akses hariap.</p>
        </div>
      </div>
      <div class="flex gap-2 w-full sm:w-auto justify-end items-center">
        <button id="pwaActionBtn" class="bg-white text-blue-700 text-xs font-bold px-4 py-2 rounded-lg hover:bg-blue-50 transition shadow-sm w-full sm:w-auto">Instolem</button>
        <button id="pwaCloseBtn" class="text-xs text-blue-200 hover:text-white px-2 py-2 transition">Dismiss</button>
      </div>
    </div>
    
    <div class="flex items-center gap-3 border-b pb-2 mb-6">
      <h2 id="viewTitle" class="text-2xl font-bold text-slate-700">Ol Topik</h2>
      <div id="loading" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-blue-700"></div>
    </div>

    <div id="gridContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 transition-opacity duration-150"></div>
  </main>

  <!-- Persistent Bottom Footer with Share Link -->
  <footer class="bg-white border-t border-slate-200 p-3 shadow-md sticky bottom-0 z-10 text-xs text-slate-500">
    <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
      <div>
        <p class="font-medium text-slate-700">Sermons by Chris Webb, Broome</p>
      </div>
      <button id="shareBtn" class="bg-slate-100 hover:bg-slate-200 text-blue-700 font-semibold px-3 py-1.5 rounded-lg transition flex items-center gap-1.5 active:scale-95">
        🔗 <span id="shareBtnText">Share</span>
      </button>
    </div>
  </footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
      storageBucket: "chook-s-sermons.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    let currentPath = '/';
    let activePlayerContainer = null;
    let activeListenBtn = null;

    const gridContainer = document.getElementById('gridContainer');
    const loadingEl = document.getElementById('loading');
    const viewTitle = document.getElementById('viewTitle');
    const backBtn = document.getElementById('backBtn');

    backBtn.addEventListener('click', () => loadDirectory('/'));

    // Handle Inline Playback logic
    async function playAudioInline(fileRefPath, fileName, buttonEl, inlinePlayerTarget, playerAudioEl) {
      const originalText = buttonEl.innerHTML;
      
      try {
        if (activePlayerContainer === inlinePlayerTarget) {
          inlinePlayerTarget.classList.add('hidden');
          playerAudioEl.pause();
          activePlayerContainer = null;
          activeListenBtn = null;
          return;
        }

        if (activePlayerContainer) {
          activePlayerContainer.classList.add('hidden');
          const oldAudio = activePlayerContainer.querySelector('audio');
          if (oldAudio) oldAudio.pause();
          if (activeListenBtn) activeListenBtn.innerHTML = `▶ Plei`;
        }

        buttonEl.disabled = true;
        buttonEl.innerHTML = `<span>Loading...</span>`;

        const fileRef = ref(storage, fileRefPath);
        const url = await getDownloadURL(fileRef);
        
        playerAudioEl.src = url;
        inlinePlayerTarget.classList.remove('hidden');
        
        activePlayerContainer = inlinePlayerTarget;
        activeListenBtn = buttonEl;

        buttonEl.innerHTML = `⏸ Close`;
        await playerAudioEl.play();

      } catch (error) {
        alert("Could not retrieve file audio playback stream URL.");
        console.error(error);
        buttonEl.innerHTML = originalText;
      } finally {
        buttonEl.disabled = false;
      }
    }

    async function loadDirectory(path, clickedCardIconEl = null) {
      activePlayerContainer = null;
      activeListenBtn = null;

      if (clickedCardIconEl) {
        clickedCardIconEl.textContent = '⌛';
      } else {
        loadingEl.classList.remove('hidden');
      }
      
      gridContainer.classList.add('opacity-50');
      currentPath = path;

      if (path === '/') {
        viewTitle.textContent = "Categories";
        backBtn.classList.add('hidden');
      } else {
        viewTitle.textContent = path.replace(/\/$/, ''); 
        backBtn.classList.remove('hidden');
      }

      try {
        const storageRef = ref(storage, path);
        const result = await listAll(storageRef);
        const fragment = document.createDocumentFragment();

        result.prefixes.forEach(folderRef => {
          const card = document.createElement('div');
          card.className = "bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition cursor-pointer flex items-center gap-4";
          card.innerHTML = `
            <div class="folder-icon text-3xl transition-transform">📁</div>
            <div>
              <h3 class="font-semibold text-slate-800 text-lg">${folderRef.name}</h3>
              <p class="text-xs text-slate-400">View folder content</p>
            </div>
          `;
          const iconEl = card.querySelector('.folder-icon');
          card.addEventListener('click', () => loadDirectory(folderRef.fullPath + '/', iconEl));
          fragment.appendChild(card);
        });

        result.items.forEach(async (fileRef) => {
          const isAudio = /\.(mp3|m4a|wav|ogg)$/i.test(fileRef.name);
          if (!isAudio) return;

          const card = document.createElement('div');
          card.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between gap-3 transition-all";
          const cleanName = fileRef.name.replace(/\.[^/.]+$/, "");

          card.innerHTML = `
            <div>
              <h3 class="font-medium text-slate-800 text-sm break-words line-clamp-3">${cleanName}</h3>
            </div>
            <div class="inline-player-container hidden border-t pt-3 mt-1">
              <audio class="inline-audio-player w-full native-controls" controls></audio>
            </div>
            <div class="flex items-center gap-2 mt-auto">
              <button class="listen-btn bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-medium transition flex-grow flex items-center justify-center gap-1">
                ▶ Plei
              </button>
              <button class="download-btn bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs p-2 rounded-lg font-medium transition" title="Download">
                📥 Daonlot
              </button>
            </div>
          `;

          const listenBtn = card.querySelector('.listen-btn');
          const downloadBtn = card.querySelector('.download-btn');
          const playerTray = card.querySelector('.inline-player-container');
          const audioNode = card.querySelector('.inline-audio-player');

          listenBtn.addEventListener('click', () => {
            playAudioInline(fileRef.fullPath, fileRef.name, listenBtn, playerTray, audioNode);
          });

          downloadBtn.addEventListener('click', async () => {
            const originalDlText = downloadBtn.innerHTML;
            try {
              downloadBtn.innerHTML = "⌛";
              downloadBtn.disabled = true;
              
              const url = await getDownloadURL(fileRef);
              const response = await fetch(url);
              const blob = await response.blob();
              const blobUrl = URL.createObjectURL(blob);
              
              const a = document.createElement('a');
              a.href = blobUrl;
              a.download = fileRef.name; 
              document.body.appendChild(a);
              a.click();
              
              document.body.removeChild(a);
              URL.revokeObjectURL(blobUrl);
            } catch (err) {
              console.error("Download failed:", err);
              window.open(url, '_blank');
            } finally {
              downloadBtn.innerHTML = originalDlText;
              downloadBtn.disabled = false;
            }
          });

          fragment.appendChild(card);
        });

        gridContainer.innerHTML = '';
        gridContainer.appendChild(fragment);

        if (result.prefixes.length === 0 && result.items.length === 0) {
          gridContainer.innerHTML = `<p class="col-span-full text-center py-8 text-slate-400 text-sm">This folder is empty.</p>`;
        }

      } catch (error) {
        console.error(error);
        gridContainer.innerHTML = `<p class="col-span-full text-center text-red-500 py-8 text-sm">Error reading directory.</p>`;
      } finally { // Fixed the "biographical:" typo here ✅
        loadingEl.classList.add('hidden');
        gridContainer.classList.remove('opacity-50');
      }
    }

    // PWA Installation Engine
    let deferredPrompt;
    const pwaBanner = document.getElementById('pwaInstallBanner');
    const pwaActionBtn = document.getElementById('pwaActionBtn');
    const pwaCloseBtn = document.getElementById('pwaCloseBtn');
    const pwaInstructionText = document.getElementById('pwaInstructionText');

    pwaCloseBtn.addEventListener('click', () => pwaBanner.classList.add('hidden'));

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered.', reg.scope))
          .catch(err => console.log('Service Worker registration failed: ', err));
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) {
        pwaBanner.classList.remove('hidden');
      }
    });

    pwaActionBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      pwaBanner.classList.add('hidden');
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    if (isIOS && !isStandalone) {
      pwaInstructionText.textContent = "Tevem 'Share' ikon daon long sekrin blo yu, alao klikem 'Add to Home Screen' blo instolem app ia.";
      pwaActionBtn.classList.add('hidden');
      pwaBanner.classList.remove('hidden');
    }

    loadDirectory('/');

    // Native Sharing Engine Hook (Added back in! ✅)
    const shareBtn = document.getElementById('shareBtn');
    const shareBtnText = document.getElementById('shareBtnText');

    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: "Broome People's Church Sermons",
        text: "Listen to and download categorized sermons from Broome.",
        url: window.location.href
      };

      if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          console.log("Share sheet closed:", err);
        }
      } else {
        try {
          await navigator.clipboard.writeText(window.location.href);
          shareBtnText.textContent = "Link copied!";
          shareBtn.classList.remove('bg-slate-100', 'text-blue-700');
          shareBtn.classList.add('bg-green-100', 'text-green-700');
          
          setTimeout(() => {
            shareBtnText.textContent = "Share";
            shareBtn.classList.remove('bg-green-100', 'text-green-700');
            shareBtn.classList.add('bg-slate-100', 'text-blue-700');
          }, 2000);
        } catch (clipboardErr) {
          console.error("Clipboard copy failed:", clipboardErr);
        }
      }
    });
  </script>
</body>
</html>
